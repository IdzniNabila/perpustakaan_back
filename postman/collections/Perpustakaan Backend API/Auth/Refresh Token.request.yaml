$kind: http-request
method: POST
url: '{{base_url}}/auth/refresh'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();
      if (json.token) {
        pm.collectionVariables.set('token', json.token);
      }
