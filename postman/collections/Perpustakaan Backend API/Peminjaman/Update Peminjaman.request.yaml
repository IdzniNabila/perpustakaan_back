$kind: http-request
method: PUT
url: '{{base_url}}/peminjaman/:peminjaman'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: peminjaman
    value: '{{peminjaman_id}}'
body:
  type: json
  content: |-
    {
      "book_id": "{{book_id}}",
      "user_id": "{{user_id}}",
      "tgl_pinjam": "2026-06-18",
      "tgl_kembali": "2026-06-28"
    }
