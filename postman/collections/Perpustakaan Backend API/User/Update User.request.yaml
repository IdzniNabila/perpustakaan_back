$kind: http-request
method: PUT
url: '{{base_url}}/user/:user'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
pathVariables:
  - key: user
    value: '{{user_id}}'
body:
  type: json
  content: |-
    {
      "name": "Anggota Contoh Updated",
      "email": "anggota.updated@example.com"
    }
